apiVersion: v1
kind: ConfigMap
metadata:
  name: alert-rules
  namespace: monitoring
data:
  alert.rules.yml: |
    groups:
    - name: cpu-alert
      rules:
      - alert: HighCPUUsage
        expr: rate(container_cpu_usage_seconds_total[1m]) > 0.5
        for: 1m
        labels:
          severity: critical
        annotations:
          description: "High CPU usage detected"